# .github/workflows/geojson-to-pmtiles.yml
#
# Converts gzip-compressed parish GeoJSON files to a single parcels.pmtiles
# using tippecanoe on a Linux runner.
#
# Processes per-parish then merges to avoid OOM on standard runner (7GB RAM).
#
# If "Resource not accessible by integration" occurs: Settings → Actions →
# General → Workflow permissions → select "Read and write permissions".

name: Convert GeoJSON to PMTiles

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  convert:
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"   # Opt into Node 24 (Node 20 deprecated)

    steps:
      # ── 1. Checkout repo ─────────────────────────────────────────────────
      - name: Checkout repository
        uses: actions/checkout@v5
        with:
          lfs: true

      # ── 2. Install tippecanoe ────────────────────────────────────────────
      - name: Install tippecanoe
        run: |
          sudo apt-get update -q
          sudo apt-get install -y libsqlite3-dev zlib1g-dev build-essential
          git clone https://github.com/felt/tippecanoe.git
          cd tippecanoe && make -j$(nproc) && sudo make install
          tippecanoe --version

      # ── 3. Decompress all GeoJSON files ──────────────────────────────────
      - name: Decompress GeoJSON files
        run: |
          echo "Decompressing parish files..."
          gunzip -v parish_data/*.geojson.gz
          echo ""
          echo "Decompressed files:"
          ls -lh parish_data/*.geojson
          echo ""
          echo "Total uncompressed size:"
          du -sh parish_data/

      # ── 4. Convert each parish to PMTiles (reduces memory vs single run) ──
      - name: Convert parishes to PMTiles
        run: |
          mkdir -p parish_pmtiles
          for f in parish_data/*.geojson; do
            name=$(basename "$f" .geojson)
            echo "Converting $name..."
            tippecanoe \
              --output="parish_pmtiles/${name}.pmtiles" \
              --layer=parcels \
              --minimum-zoom=12 \
              --maximum-zoom=18 \
              --drop-densest-as-needed \
              --extend-zooms-if-still-dropping \
              --force \
              "$f"
          done
          ls -lh parish_pmtiles/

      # ── 5. Merge all parish PMTiles into one ───────────────────────────
      - name: Merge parish PMTiles
        run: |
          tile-join -o parcels.pmtiles --force parish_pmtiles/*.pmtiles
          ls -lh parcels.pmtiles
          echo "Conversion complete."

      # ── 6. Upload as workflow artifact (always available, even if release fails)
      - name: Upload PMTiles artifact
        uses: actions/upload-artifact@v4
        with:
          name: parcels-pmtiles
          path: parcels.pmtiles

      # ── 7. Create Release (optional; requires repo "Read and write" permissions)
      - name: Create Release and upload PMTiles
        uses: softprops/action-gh-release@v2
        continue-on-error: true   # Don't fail job if release permissions missing
        with:
          tag_name: pmtiles-${{ github.run_number }}
          name: "Jamaica Parcels PMTiles - Build ${{ github.run_number }}"
          body: |
            Auto-generated from parish GeoJSON files.
            - Source: eLandJamaica NLA GIS portal
            - Parcels: ~1,005,470 island-wide
            - Zoom levels: 12–18
            - CRS: WGS84
          files: parcels.pmtiles
